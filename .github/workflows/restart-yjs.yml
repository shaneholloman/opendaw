name: Restart yjs-server

on:
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 🔑 Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_SERVER: ${{ secrets.SSH_SERVER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${SSH_SERVER#*@}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: 🔄 Restart yjs-server
        env:
          SSH_SERVER: ${{ secrets.SSH_SERVER }}
        run: ssh "$SSH_SERVER" "systemctl restart opendaw-yjs && systemctl status opendaw-yjs --no-pager"
